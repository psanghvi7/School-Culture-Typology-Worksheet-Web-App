name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 4 hours to keep the container active (Streamlit Cloud idle timeout is ~12 hours)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  keep_awake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright & Browser
        run: |
          pip install playwright
          playwright install chromium

      - name: Load Streamlit App
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          
          url = 'https://school-culture-typology-survey.streamlit.app/'
          print(f'Navigating to {url}...')
          
          with sync_playwright() as p:
              # Launch headless browser
              browser = p.chromium.launch()
              page = browser.new_page()
              
              # Go to Streamlit URL
              page.goto(url)
              
              # Wait 10 seconds to allow the page and WebSockets to fully load
              time.sleep(10)
              
              print('Page loaded successfully!')
              print('Title:', page.title())
              browser.close()
          "
